services:
  proxy-switcher:
    build: .
    image: proxy-switcher:latest
    container_name: proxy-switcher
    restart: unless-stopped
    ports:
      - "9090:9090"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./config/proxy-switcher.docker.toml:/etc/proxy-switcher/config.toml:ro
      - proxy-switcher-data:/var/lib/proxy-switcher
    environment:
      - RUST_LOG=proxy=info
    logging:
      driver: json-file
      options:
        tag: proxy-switcher

volumes:
  proxy-switcher-data:
